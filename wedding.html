<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Wedding Vendors</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
}

/* Header */
header {
    background: #ff4d6d;
    color: white;
    padding: 15px;
    text-align: center;
}

/* Back button */
.back {
    display: inline-block;
    margin: 15px;
    text-decoration: none;
    color: white;
    background: #333;
    padding: 8px 12px;
    border-radius: 6px;
}

/* Container */
.container {
    padding: 20px;
}

/* Cards */
.card {
    background: white;
    padding: 15px;
    margin: 15px 0;
    border-radius: 10px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
}

/* Info row */
.info {
    display: flex;
    justify-content: space-between;
    margin-top: 10px;
}

/* Buttons */
.buttons {
    margin-top: 10px;
    display: flex;
    gap: 10px;
}

.buttons a {
    flex: 1;
    text-align: center;
    padding: 8px;
    color: white;
    border-radius: 6px;
    text-decoration: none;
}

/* Call */
.call {
    background: green;
}

/* Chat */
.chat {
    background: #25d366;
}
</style>

</head>

<body>

<header>
    <h1>💍 Wedding Vendors</h1>
	<div class="budget-box">
        <label>Budget:</label>
        <select>
            <option>All</option>
            <option>Below ₹3000</option>
            <option>₹3000 - ₹7000</option>
            <option>Above ₹7000</option>
        </select>
    </div>
</header>



<div class="container">

    <div class="card">
        <h3>Royal Wedding Decor</h3>
        <p>📍 Bangalore</p>
        <p>Stage, Flowers, Lighting</p>

        <div class="info">
            <span>₹15000+</span>
            <span>⭐ 4.8</span>
        </div>

        <div class="buttons">
            <a href="tel:9876543210" class="call">Call</a>
            <a href="https://wa.me/919876543210" class="chat">Chat</a>
        </div>
    </div>

    <div class="card">
        <h3>Elite Caterers</h3>
        <p>📍 Hyderabad</p>
        <p>Veg & Non-Veg Catering</p>

        <div class="info">
            <span>₹500 per plate</span>
            <span>⭐ 4.6</span>
        </div>

        <div class="buttons">
            <a href="tel:9123456780" class="call">Call</a>
            <a href="https://wa.me/919123456780" class="chat">Chat</a>
        </div>
    </div>

    <div class="card">
        <h3>Golden Moments Photography</h3>
        <p>📍 Chennai</p>
        <p>Photography & Videography</p>

        <div class="info">
            <span>₹20000+</span>
            <span>⭐ 4.9</span>
        </div>

        <div class="buttons">
            <a href="tel:9988776655" class="call">Call</a>
            <a href="https://wa.me/919988776655" class="chat">Chat</a>
        </div>
    </div>

</div>

</body>
</html>
